name: Generate and Publish Content

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Do not post externally'
        required: true
        default: 'true'
      publish:
        description: 'Create publish plans or publish when dry_run=false'
        required: true
        default: 'true'
      theme:
        description: 'Content theme'
        required: true
        default: 'NotebookLMとNotion素材から独自価値のあるAIラジオを作る'
  schedule:
    - cron: '0 0 * * 1'

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      NOTEBOOKLM_ENTERPRISE_ACCESS_TOKEN: ${{ secrets.NOTEBOOKLM_ENTERPRISE_ACCESS_TOKEN }}
      NOTEBOOKLM_ENTERPRISE_API_BASE: ${{ secrets.NOTEBOOKLM_ENTERPRISE_API_BASE }}
      NOTEBOOKLM_NOTEBOOK_RESOURCE: ${{ secrets.NOTEBOOKLM_NOTEBOOK_RESOURCE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install package
        run: python -m pip install -U pip && python -m pip install -e '.[dev]'
      - name: Generate content
        run: |
          content-pipeline run \
            --sources data/sample_sources \
            --theme "${{ github.event.inputs.theme || 'NotebookLMとNotion素材から独自価値のあるAIラジオを作る' }}" \
            --dry-run "${{ github.event.inputs.dry_run || 'true' }}" \
            --publish "${{ github.event.inputs.publish || 'true' }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: content-pipeline-outputs
          path: dist/
          if-no-files-found: error
