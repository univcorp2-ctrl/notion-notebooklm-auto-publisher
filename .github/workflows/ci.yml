name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -U pip && python -m pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest -q
